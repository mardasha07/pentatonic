<style>
  :root{
    --bg:#13151a;--panel:#1b1e26;--panel-2:#232732;--line:#2e3340;--line-bright:#3c4254;
    --ink:#e8eaf0;--ink-dim:#9aa0b0;--ink-faint:#646b7d;
    --minor:#3d8ad8;     /* minor pentatonic - blue */
    --major:#d8483f;     /* major pentatonic - red */
    --diatonic:#566074;  /* extra scale notes - muted slate */
    --blue:#41b9a8;      /* blue note - teal */
    --rootring:#ffffff;  /* tonic outline */
    --glow:#3fb98a;--glowbend:#d9a441;
    --radius:10px;--radius-sm:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;padding:0 0 56px}
  .mono{font-family:'SF Mono','Roboto Mono',Menlo,Consolas,monospace}
  header{border-bottom:1px solid var(--line);padding:22px 28px;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
  .logo{font-size:23px;font-weight:700;letter-spacing:-0.02em}
  .wrap{max-width:1240px;margin:0 auto;padding:0 28px}

  .controls{display:flex;gap:30px;flex-wrap:wrap;align-items:flex-start;padding:26px 0 22px;border-bottom:1px solid var(--line)}
  .field{display:flex;flex-direction:column;gap:9px}
  .field > label{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-faint);font-weight:600}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .tg{background:var(--panel);border:1px solid var(--line);color:var(--ink-dim);padding:9px 15px;font-size:13px;cursor:pointer;border-radius:var(--radius-sm);font-weight:500;transition:background .12s,color .12s,border-color .12s;display:flex;align-items:center;gap:7px}
  .tg:hover{color:var(--ink);border-color:var(--line-bright)}
  .tg .sw{width:9px;height:9px;border-radius:50%;background:currentColor;opacity:.35;transition:opacity .12s}
  .tg.on{color:var(--ink);background:var(--panel-2)}.tg.on .sw{opacity:1}
  .tg.on.min{border-color:var(--minor)}.tg.on.min .sw{color:var(--minor)}
  .tg.on.maj{border-color:var(--major)}.tg.on.maj .sw{color:var(--major)}
  .tg.on.fl{border-color:var(--diatonic)}.tg.on.fl .sw{color:var(--diatonic)}
  .tg.on.bn{border-color:var(--blue)}.tg.on.bn .sw{color:var(--blue)}
  .keys{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;max-width:690px}
  .keys button{background:var(--panel);border:1px solid var(--line);color:var(--ink-dim);padding:9px 0;font-size:14px;cursor:pointer;border-radius:var(--radius-sm);transition:background .12s,color .12s,border-color .12s;font-weight:500}
  .keys button:hover{color:var(--ink);border-color:var(--line-bright)}
  .keys button.on{background:var(--panel-2);border-color:var(--ink-dim);color:var(--ink)}
  .seg{display:inline-flex;align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden}
  .seg button{background:transparent;border:none;color:var(--ink-dim);padding:9px 14px;font-size:13px;cursor:pointer;font-weight:500;transition:background .12s,color .12s;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:none}
  .seg button:hover{color:var(--ink)}
  .seg button.on{background:var(--panel-2);color:var(--ink)}

  .legend{display:flex;gap:18px;flex-wrap:wrap;padding:16px 0 0;font-size:12px;color:var(--ink-dim)}
  .legend span{display:flex;align-items:center;gap:6px}
  .legend i{width:12px;height:12px;border-radius:50%;display:inline-block}
  .legend i.ring{box-shadow:inset 0 0 0 2px var(--rootring);background:var(--minor)}

  .board-section{padding:22px 0}
  .board-scroll{overflow-x:auto;padding-bottom:8px}
  .fretboard{position:relative;background:linear-gradient(180deg,#332a1d,#251d14);border:1px solid #3a2f22;border-radius:var(--radius);padding:18px 16px 8px}
  .nut{position:absolute;top:18px;width:7px;background:#d8d2c4;border-radius:3px;z-index:3}
  .fretwire{position:absolute;width:2.5px;background:#8a7a5e;top:18px;z-index:1}
  .boxshade{position:absolute;top:18px;background:rgba(120,170,230,.07);border-left:1px dashed rgba(150,190,240,.35);border-right:1px dashed rgba(150,190,240,.35);z-index:0}
  .frets{position:relative;z-index:2}
  .string-row{position:relative;height:54px;display:flex;align-items:center}
  .string-line{position:absolute;right:10px;top:50%}
  .string-row:nth-child(1) .string-line{height:3px;background:#6a5c44}
  .string-row:nth-child(2) .string-line{height:2.6px;background:#665841}
  .string-row:nth-child(3) .string-line{height:2.2px;background:#62543e}
  .string-row:nth-child(4) .string-line{height:1.8px;background:#5e503a}
  .string-row:nth-child(5) .string-line{height:1.4px;background:#5a4d37}
  .string-row:nth-child(6) .string-line{height:1.1px;background:#564a34}
  .open-label{position:absolute;left:16px;width:28px;text-align:center;font-size:13px;color:var(--ink-faint);font-weight:600}
  .cell{position:absolute;width:40px;height:40px;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center}
  .dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;position:relative;transition:box-shadow .22s ease-out, transform .22s ease-out}
  .dot.min{background:var(--minor)}
  .dot.maj{background:var(--major)}
  .dot.both{background:linear-gradient(90deg,var(--minor) 50%,var(--major) 50%)}
  .dot.diatonic{background:var(--diatonic);font-size:11px;width:32px;height:32px}
  .dot.blue{background:var(--blue)}
  .dot.root{box-shadow:0 0 0 3px var(--rootring), 0 0 0 4px rgba(0,0,0,.35)}
  .dot.lit{box-shadow:0 0 0 3px rgba(63,185,138,.95), 0 0 22px 4px rgba(63,185,138,.55);transform:scale(1.12);z-index:7}
  .dot.root.lit{box-shadow:0 0 0 3px var(--rootring), 0 0 0 4px rgba(63,185,138,.95), 0 0 22px 5px rgba(63,185,138,.55)}
  .glow{position:absolute;width:36px;height:36px;border-radius:50%;top:0;left:0;pointer-events:none;z-index:6;opacity:0;transform:translate(-50%,-50%);box-shadow:0 0 0 3px rgba(63,185,138,.95),0 0 26px 5px rgba(63,185,138,.5);transition:opacity .12s, left .14s ease-out, top .14s ease-out}
  .glow.show{opacity:1}
  .glow.bending{box-shadow:0 0 0 3px rgba(217,164,65,.95),0 0 26px 5px rgba(217,164,65,.5)}
  .glow.snap{transition:opacity .1s, left .05s ease-out, top .05s ease-out}
  .fret-nums{position:relative;height:18px;margin-top:6px}
  .fret-num{position:absolute;transform:translateX(-50%);font-size:11px;color:var(--ink-faint);font-weight:600}
  .inlay{position:absolute;width:9px;height:9px;border-radius:50%;background:#4a3e2c;transform:translate(-50%,-50%);z-index:1}

  .mic-section{padding:16px 0 0;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .mic-btn{background:var(--glow);border:none;color:#0c1410;font-weight:600;padding:11px 20px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;display:flex;align-items:center;gap:8px;transition:opacity .15s,background .15s}
  .mic-btn:hover{opacity:.9}.mic-btn:disabled{opacity:.5;cursor:wait}
  .mic-btn.live{background:var(--major)}
  .mic-btn .pulse{width:8px;height:8px;border-radius:50%;background:currentColor}
  .mic-btn.live .pulse{animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .now{display:flex;align-items:baseline;gap:14px}
  .now .nb{font-size:34px;font-weight:700;line-height:1;min-width:54px}
  .now .nb .oct{font-size:15px;color:var(--ink-dim);vertical-align:super}
  .now .meta{font-size:13px;color:var(--ink-dim)}
  .now .cents{font-weight:600}.now .cents.bend{color:var(--glowbend)}
</style>
</head>
<body>
<header>
  <div class="logo">Play Your Solo</div>
</header>

<div class="wrap">
  <div class="controls">
    <div class="field">
      <label>Пентатоника</label>
      <div class="row" id="scaleToggles">
        <button class="tg min on" data-s="minor"><span class="sw"></span>Минорная</button>
        <button class="tg maj" data-s="major"><span class="sw"></span>Мажорная</button>
      </div>
    </div>
    <div class="field">
      <label>Тоника</label>
      <div class="keys" id="keyGrid"></div>
    </div>
    <div class="field">
      <label>Дополнительно</label>
      <div class="row">
        <button class="tg fl" id="tgFull"><span class="sw"></span>Полная гамма</button>
        <button class="tg bn" id="tgBlue"><span class="sw"></span>Блюзовая нота</button>
      </div>
    </div>
    <div class="field">
      <label>Боксы (CAGED) — можно несколько</label>
      <div class="seg" id="boxCount">
        <button data-n="1">1</button>
        <button data-n="2">2</button>
        <button data-n="3">3</button>
        <button data-n="4">4</button>
        <button data-n="5">5</button>
        <button data-n="all" class="on">Все</button>
      </div>
    </div>
    <div class="field">
      <label>Подсветка с микрофона</label>
      <div class="seg" id="hlMode">
        <button data-h="note" class="on">Ноты</button>
        <button data-h="bend">Бенды</button>
      </div>
      <div class="mic-section">
        <button class="mic-btn" id="micBtn" disabled><span class="pulse"></span><span id="micLabel">Загрузка движка…</span></button>
        <div class="now">
          <div class="nb" id="nowNote">—</div>
          <div class="meta">
            <span class="mono" id="nowFreq">— Hz</span> ·
            <span class="cents mono" id="nowCents"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="board-section">
    <div class="board-scroll">
      <div class="fretboard" id="fretboard">
        <div class="frets" id="frets"></div>
        <div class="glow snap" id="glow"></div>
        <div class="fret-nums" id="fretNums"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { PitchDetector } from "https://esm.sh/pitchy@4";

(function(){
  "use strict";
  var CHROMATIC=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  var STRINGS=[
    {name:"e",open:4,octave:4},{name:"B",open:11,octave:3},{name:"G",open:7,octave:3},
    {name:"D",open:2,octave:3},{name:"A",open:9,octave:2},{name:"E",open:4,octave:2}
  ];
  var FRETS=20;
  var INLAYS=[3,5,7,9,12,15,17,19];
  var PENT={minor:[0,3,5,7,10],major:[0,2,4,7,9]};
  var DIATONIC={minor:[0,2,3,5,7,8,10],major:[0,2,4,5,7,9,11]};
  var BLUE={minor:6,major:3};
  var BOX_SPANS=[[0,3],[2,5],[5,8],[7,10],[10,13]];
  // major-pentatonic boxes: same shapes but one fret wider on the left
  var MAJOR_BOX_SPANS=[[-1,3],[1,5],[4,8],[6,10],[9,13]];

  // geometry: X0 is the nut offset (fixed); FRETW is computed to fit the screen,
  // but never below FRETW_MIN — below that the board scrolls horizontally.
  var X0=52, FRETW=66, FRETW_MIN=40;
  function computeFretW(){
    var scroll=document.querySelector(".board-scroll");
    var avail=scroll ? scroll.clientWidth : 1000;
    // available width for the frets area = container minus nut offset and side padding
    var w=(avail - X0 - 34) / FRETS;          // 34 = fretboard left+right padding
    FRETW=Math.max(FRETW_MIN, Math.min(66, w)); // cap at 66 so it never looks stretched
  }
  function fretCenterX(f){ return f===0 ? X0-22 : X0 + (f-0.5)*FRETW; }
  function fretWireX(f){ return X0 + f*FRETW; }

  var state={
    minor:true, major:false, rootPc:9,
    full:false, blue:false,
    boxes:[], hlMode:"note"   // boxes: active box indices 0..4; empty = all
  };

  var keyGrid=document.getElementById("keyGrid");
  CHROMATIC.forEach(function(n,i){
    var b=document.createElement("button");
    b.textContent=n;b.dataset.pc=i;
    if(i===state.rootPc)b.classList.add("on");
    b.onclick=function(){
      state.rootPc=i;
      [].forEach.call(keyGrid.children,function(c){c.classList.remove("on")});
      b.classList.add("on"); render();
    };
    keyGrid.appendChild(b);
  });

  document.getElementById("scaleToggles").addEventListener("click",function(e){
    var btn=e.target.closest("button"); if(!btn) return;
    var s=btn.dataset.s, other=s==="minor"?"major":"minor";
    if(state[s] && !state[other]) return;
    state[s]=!state[s];
    btn.classList.toggle("on",state[s]);
    render();
  });
  document.getElementById("tgFull").onclick=function(){state.full=!state.full;this.classList.toggle("on",state.full);render();};
  document.getElementById("tgBlue").onclick=function(){state.blue=!state.blue;this.classList.toggle("on",state.blue);render();};

  document.getElementById("boxCount").addEventListener("click",function(e){
    var btn=e.target.closest("button"); if(!btn) return;
    var seg=this;
    if(btn.dataset.n==="all"){
      state.boxes=[];
      [].forEach.call(seg.children,function(c){c.classList.remove("on")});
      btn.classList.add("on");
    } else {
      var n=parseInt(btn.dataset.n,10)-1;     // 0-based box index
      var i=state.boxes.indexOf(n);
      if(i===-1) state.boxes.push(n); else state.boxes.splice(i,1);
      btn.classList.toggle("on",state.boxes.indexOf(n)!==-1);
      // "Все" is on only when no individual box is selected
      var allBtn=seg.querySelector('[data-n="all"]');
      allBtn.classList.toggle("on",state.boxes.length===0);
    }
    render();
  });
  document.getElementById("hlMode").addEventListener("click",function(e){
    var btn=e.target.closest("button"); if(!btn) return;
    state.hlMode=btn.dataset.h;
    [].forEach.call(this.children,function(c){c.classList.remove("on")});
    btn.classList.add("on");
    var glow=document.getElementById("glow");
    glow.classList.toggle("snap",state.hlMode==="note");
    glow.classList.remove("show","bending");
    clearLitDots();
  });

  // role of a pitch class: which colors + is it the tonic
  function pcInfo(pc){
    var off=((pc-state.rootPc)%12+12)%12;
    var inMin=state.minor && PENT.minor.indexOf(off)!==-1;
    var inMaj=state.major && PENT.major.indexOf(off)!==-1;
    var isRoot=off===0 && (state.minor||state.major);
    var color=null;
    if(inMin && inMaj) color="both";
    else if(inMin) color="min";
    else if(inMaj) color="maj";

    if(color) return {color:color,root:isRoot};

    if(state.blue){
      if(state.minor && off===BLUE.minor) return {color:"blue",root:false};
      if(state.major && off===BLUE.major) return {color:"blue",root:false};
    }
    if(state.full){
      var inDiaMin=state.minor && DIATONIC.minor.indexOf(off)!==-1;
      var inDiaMaj=state.major && DIATONIC.major.indexOf(off)!==-1;
      if(inDiaMin||inDiaMaj) return {color:"diatonic",root:false};
    }
    return null;
  }

  // returns array of {lo,hi} windows for each active box; null = show all frets
  function boxWindows(){
    if(state.boxes.length===0) return null;       // "Все"
    var rootFretLowE=((state.rootPc-STRINGS[5].open)%12+12)%12;
    // wider major box shapes whenever major is active (major-only OR both);
    // minor-only keeps the standard spans
    var spans = state.major ? MAJOR_BOX_SPANS : BOX_SPANS;
    return state.boxes.slice().sort(function(a,b){return a-b;}).map(function(idx){
      return {
        lo:Math.max(0,rootFretLowE+spans[idx][0]),
        hi:Math.min(FRETS,rootFretLowE+spans[idx][1])
      };
    });
  }
  function inAnyWindow(f,wins){
    if(!wins) return true;
    for(var i=0;i<wins.length;i++) if(f>=wins[i].lo && f<=wins[i].hi) return true;
    return false;
  }

  var dotMap=[];

  function render(){
    computeFretW();
    var wins=boxWindows();
    buildLegend();
    var frets=document.getElementById("frets");frets.innerHTML="";
    dotMap=[];
    var boardW=X0+FRETS*FRETW+18;
    var fb=document.getElementById("fretboard");
    fb.style.minWidth=boardW+"px";fb.style.width=boardW+"px";
    [].forEach.call(fb.querySelectorAll(".fretwire,.nut,.inlay,.boxshade"),function(n){n.remove()});
    var boardH=STRINGS.length*54;

    var nut=document.createElement("div");nut.className="nut";
    nut.style.left=X0+"px";nut.style.height=boardH+"px";fb.appendChild(nut);
    for(var f=1;f<=FRETS;f++){
      var w=document.createElement("div");w.className="fretwire";
      w.style.left=fretWireX(f)+"px";w.style.height=boardH+"px";fb.appendChild(w);
    }
    if(wins){
      wins.forEach(function(win){
        var loEdge=fretWireX(Math.max(0,win.lo-1));
        var hiEdge=fretWireX(win.hi);
        var sh=document.createElement("div");sh.className="boxshade";
        sh.style.left=loEdge+"px";sh.style.width=(hiEdge-loEdge)+"px";sh.style.height=boardH+"px";fb.appendChild(sh);
      });
    }
    INLAYS.forEach(function(f){
      var ys=f===12?[boardH*0.30,boardH*0.70]:[boardH*0.5];
      ys.forEach(function(y){
        var inl=document.createElement("div");inl.className="inlay";
        inl.style.left=fretCenterX(f)+"px";inl.style.top=(18+y)+"px";fb.appendChild(inl);
      });
    });

    STRINGS.forEach(function(str,si){
      var row=document.createElement("div");row.className="string-row";
      var line=document.createElement("div");line.className="string-line";
      line.style.left=X0+"px";row.appendChild(line);
      var open=document.createElement("div");open.className="open-label";open.textContent=str.name;row.appendChild(open);
      for(var f=0;f<=FRETS;f++){
        var pc=(str.open+f)%12;
        var info=pcInfo(pc);
        if(!info) continue;
        if(!inAnyWindow(f,wins)) continue;
        var cell=document.createElement("div");cell.className="cell";
        cell.style.left=fretCenterX(f)+"px";
        var dot=document.createElement("div");
        dot.className="dot "+info.color+(info.root?" root":"");
        dot.textContent=CHROMATIC[pc];
        cell.appendChild(dot);row.appendChild(cell);
        dotMap.push({string:si,midi:(str.octave+1)*12+str.open+f,pc:pc,el:dot});
      }
      frets.appendChild(row);
    });

    var nums=document.getElementById("fretNums");nums.innerHTML="";
    for(var f=1;f<=FRETS;f++){
      var n=document.createElement("div");n.className="fret-num";
      n.textContent=f;n.style.left=fretCenterX(f)+"px";nums.appendChild(n);
    }
  }

  function buildLegend(){
    var L=document.getElementById("legend");var items=[];
    if(state.minor) items.push(['background:var(--minor)','минорная пентатоника']);
    if(state.major) items.push(['background:var(--major)','мажорная пентатоника']);
    if(state.minor&&state.major) items.push(['background:linear-gradient(90deg,var(--minor) 50%,var(--major) 50%)','общие ноты']);
    items.push(['background:var(--minor);box-shadow:inset 0 0 0 2px #fff','тоника (обводка)']);
    if(state.blue) items.push(['background:var(--blue)','блюзовая нота']);
    if(state.full) items.push(['background:var(--diatonic)','остальные ноты гаммы']);
    L.innerHTML=items.map(function(it){return '<span><i style="'+it[0]+'"></i>'+it[1]+'</span>';}).join("");
  }

  function clearLitDots(){
    dotMap.forEach(function(d){ d.el.classList.remove("lit"); });
  }

  function placeGlow(midiFloat){
    var glow=document.getElementById("glow");
    if(state.hlMode==="note"){
      // light up ALL visible dots of the played pitch class (like the first version)
      glow.classList.remove("show");          // single glow not used in note mode
      clearLitDots();
      if(midiFloat==null) return;
      var pc=((Math.round(midiFloat)%12)+12)%12;
      dotMap.forEach(function(d){
        if(d.pc===pc) d.el.classList.add("lit");
      });
      return;
    }
    // bend mode: single sliding glow following the exact pitch
    clearLitDots();
    if(midiFloat==null){glow.classList.remove("show");return;}
    var best=null,bd=999;
    dotMap.forEach(function(d){var dist=Math.abs(d.midi-midiFloat);if(dist<bd){bd=dist;best=d;}});
    if(!best || bd>3){glow.classList.remove("show");return;}
    var str=STRINGS[best.string];
    var openMidi=(str.octave+1)*12+str.open;
    var ff=Math.max(0,Math.min(FRETS,midiFloat-openMidi));
    var x = ff<=0 ? X0-22 : X0+(ff-0.5)*FRETW;
    var y = 18 + best.string*54 + 27;
    glow.style.left=x+"px";glow.style.top=y+"px";glow.classList.add("show");
  }

  // ================= AUDIO =================
  var audioCtx,analyser,detector,inputBuf,raf,stream,running=false;
  var A4=440;
  var micBtn=document.getElementById("micBtn"),micLabel=document.getElementById("micLabel");
  micBtn.disabled=false;micLabel.textContent="Включить микрофон";

  micBtn.onclick=function(){
    if(running){stop();return;}
    navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,autoGainControl:false,noiseSuppression:false}})
      .then(function(s){
        stream=s;
        audioCtx=new (window.AudioContext||window.webkitAudioContext)();
        analyser=audioCtx.createAnalyser();analyser.fftSize=2048;
        inputBuf=new Float32Array(2048);
        detector=PitchDetector.forFloat32Array(2048);
        detector.minVolumeDecibels=-30;
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        running=true;micBtn.classList.add("live");micLabel.textContent="Остановить";loop();
      })
      .catch(function(err){
        micLabel.textContent=(err&&err.name==="NotAllowedError")?"Доступ запрещён — нужен HTTPS/localhost":"Ошибка: "+(err&&err.name||err);
        console.error(err);
      });
  };
  function stop(){
    running=false;if(raf)cancelAnimationFrame(raf);
    if(stream)stream.getTracks().forEach(function(t){t.stop()});
    if(audioCtx)audioCtx.close();
    micBtn.classList.remove("live");micLabel.textContent="Включить микрофон";
    document.getElementById("glow").classList.remove("show");
    clearLitDots();
    document.getElementById("nowNote").textContent="—";
    document.getElementById("nowFreq").textContent="— Hz";
    document.getElementById("nowCents").textContent="";
  }
  function midiFloat(freq){return 69+12*Math.log2(freq/A4);}

  function loop(){
    analyser.getFloatTimeDomainData(inputBuf);
    var res=detector.findPitch(inputBuf,audioCtx.sampleRate);
    var freq=res[0],clarity=res[1];
    var nN=document.getElementById("nowNote"),nF=document.getElementById("nowFreq"),nC=document.getElementById("nowCents");
    var glow=document.getElementById("glow");
    if(clarity<0.85||freq<70||freq>1300){
      nN.textContent="—";nF.textContent="— Hz";nC.textContent="";nC.className="cents mono";
      glow.classList.remove("show");
      clearLitDots();
    } else {
      var mf=midiFloat(freq),near=Math.round(mf),cents=Math.round((mf-near)*100);
      var pc=((near%12)+12)%12;
      nN.innerHTML=CHROMATIC[pc]+'<span class="oct">'+(Math.floor(near/12)-1)+'</span>';
      nF.textContent=freq.toFixed(1)+" Hz";
      placeGlow(mf);
      if(state.hlMode==="bend" && Math.abs(cents)>25){
        glow.classList.add("bending");
        nC.textContent="бенд "+(cents>0?"+":"")+cents+"¢";nC.className="cents mono bend";
      } else {
        glow.classList.remove("bending");
        nC.textContent=(cents>=0?"+":"")+cents+"¢";nC.className="cents mono";
      }
    }
    raf=requestAnimationFrame(loop);
  }

  render();

  // re-fit the board when the window width changes (debounced)
  var resizeTimer=null;
  window.addEventListener("resize",function(){
    clearTimeout(resizeTimer);
    resizeTimer=setTimeout(render,120);
  });
})();
</script>
